<html>
<head>
<title>NVDA Profile Viewer</title>
<style>
/* Hide the descendants of collapsed branches. */
[role=treeitem][aria-expanded=false] > [role=group] {
	display: none;
}
/* Indent each level. */
#tree [role=group] {
	padding-left: 24px;
}
/* Visual indicators for collapsed/expanded. Hidden for accessibility using
 * empty CSS alt text because aria-expanded provides semantic indication. */
[role=treeitem][aria-expanded=false]::before {
	content: "+" / "";
}
[role=treeitem][aria-expanded=true]::before {
	content: "-" / "";
}
/* Hide items excluded by the filter. */
.excluded {
	display: none;
}
/* We manage focus using aria-activedescendant. Hide the focus ring around the
 * tree itself and show a focus ring for the active item.
 */
#tree:focus-visible {
	outline: none;
}
.selected {
	outline: 2px solid Highlight;
}
</style>
</head>
<body>

<h1>NVDA Profile Viewer</h1>
<section id="chooseFile">
	<p>Generate a profile with:</p>
	<code><pre>py-spy record -f raw -t --full-filenames -o yourFileName -p yourNvdaPid</pre></code>
	<label>
		Choose a file:
		<input id="file" type="file">
	</label>
	<button id="demo">Demo profile</button>
</section>
<section id="profile" hidden>
	<section>
		<label>
			Thread:
			<select id="thread" accesskey="t"></select>
		</label>
		<label>
			<input id="invert" type="checkbox" checked accesskey="i">
			Invert stack
		</label>
		<label>
			Filter:
			<input id="filter" type="text" accesskey="f">
		</label>
	</section>
	<div id="tree" tabindex="0" role="tree"></div>
</section>

<script>
document.getElementById("file").addEventListener("change", changeEvt => {
	const file = changeEvt.target.files[0];
	if (!file) {
		return;
	}
	const reader = new FileReader();
	reader.onload = loadEvt => {
		const data = loadEvt.target.result;
		parseProfile(data);
	};
	reader.readAsText(file);
});

document.getElementById("demo").addEventListener("click", async () => {
	const res = await fetch("demo.txt");
	parseProfile(await res.text());
});

const threadSel = document.getElementById("thread");
const threadSamples = new Map();
let totalCount = 0;

function parseProfile(data) {
	lines = data.split(/\r?\n/);
	document.getElementById("chooseFile").hidden = true;
	document.getElementById("profile").hidden = false;
	for (const line of lines) {
		const m = line.match(
			/thread \((?<threadId>\d+)\): (?<threadName>.*?);(?<stack>.*?) (?<count>\d+)/
		);
		if (!m) {
			continue;
		}
		const thread = `${m.groups.threadId} ${m.groups.threadName}`;
		// Add this sample to the samples for its thread.
		let samples = threadSamples.get(thread);
		if (!samples) {
			// This is the first time we've seen this thread.
			samples = [];
			threadSamples.set(thread, samples);
		}
		const count = Number(m.groups.count);
		samples.push({
			stack: m.groups.stack.split(";"),
			count
		});
		totalCount += count;
	}
	for (const [thread, samples] of threadSamples) {
		threadSel.add(new Option(thread));
	}
	threadSel.options[0].selected = true;
	updateTree();
	tree.focus();
}

function toPercent(count) {
	const percent = count / totalCount * 100;
	return `${percent.toFixed(2)}%`;
}

const tree = document.getElementById("tree");
const invert = document.getElementById("invert");
const filter = document.getElementById("filter");

function addTreeItem(parent, item) {
	let container;
	if (!parent.role) {
		container = parent; // Root
	} else if (parent.children[1]) {
		container = parent.children[1];
	} else {
		container = document.createElement("div");
		parent.append(container);
		container.role = "group";
		parent.ariaExpanded = "false";
	}
	container.append(item);
}

// Sort sibling tree items from highest to lowest total count.
function sortContainer(container) {
	const items = Array.from(container.children);
	items.sort((a, b) => b.totalCount - a.totalCount);
	container.replaceChildren(...items);
}

function getSelectedItem() {
	return tree.ariaActiveDescendantElement;
}

function updateTree(restoreSelected=false) {
	const thread = threadSel.selectedOptions[0].label;
	const samples = threadSamples.get(thread);
	const prevSel = restoreSelected ? getSelectedItem() : null;
	const frag = document.createDocumentFragment();
	// Maps a stack path to a node. This is how we aggregate frames across samples.
	const nodes = new Map();
	const frameIdsToNodes = new Map();
	let sampleNum = 0;
	for (const sample of samples) {
		let parent = frag;
		let path = "";
		let level = 1;
		const stack = invert.checked ? sample.stack.toReversed() : sample.stack;
		for (const frame of stack) {
			if (path) {
				path += ";";
			}
			path += frame;
			let node = nodes.get(path);
			const frameNum = invert.checked ? stack.length - level + 1 : level;
			const frameId = `${sampleNum}.${frameNum}`;
			if (!node) {
				// This stack path doesn't have a node in the tree yet.
				node = document.createElement("div");
				nodes.set(path, node);
				addTreeItem(parent, node);
				node.role = "treeitem";
				node.totalCount = node.selfCount = 0;
				node.frame = frame;
				node.frameId = frameId;
				const span = document.createElement("span");
				node.append(span);
			}
			node.totalCount += sample.count;
			if (invert.checked ? level == 1 : level == stack.length) {
				node.selfCount += sample.count;
			}
			if (prevSel) {
				// Frames in multiple samples might be aggregated into a single tree node.
				// However, this aggregation changes when the stack is inverted vs when it
				// isn't. Therefore, keep track of all the sample frames with which this node
				// is associated.
				frameIdsToNodes.set(frameId, node);
			}
			parent = node;
			++level;
		}
		++sampleNum;
	}
	// Now that we have the aggregated counts, we can label the nodes.
	for (const [path, node] of nodes) {
		node.firstElementChild.textContent =
			`${node.frame}, total ${node.totalCount} (${toPercent(node.totalCount)}), self ${node.selfCount} (${toPercent(node.selfCount)})`;
	}
	sortContainer(frag);
	for (const container of frag.querySelectorAll("[role=group]")) {
		sortContainer(container);
	}
	tree.replaceChildren(frag);
	filter.value = "";
	if (prevSel) {
		// Restore to the same frame when toggling invert.
		const sel = frameIdsToNodes.get(prevSel.frameId);
		// Open the ancestor branches so this item can be selected.
		for (let parent = sel.parentElement; parent != tree;
			parent = parent.parentElement
		) {
			parent.ariaExpanded = "true";
		}
		selectItem(sel);
	} else {
		selectItem(tree.querySelector("[role=treeitem]"));
	}
}

const walker = document.createTreeWalker(
	tree, NodeFilter.SHOW_ELEMENT, node => {
		if (node.role == "group" && node.parentElement.ariaExpanded == "false") {
			// This is a closed branch. Don't descend inside it.
			return NodeFilter.FILTER_REJECT;
		}
		if (node.classList.contains("excluded")) {
			// This branch is excluded by the filter.
			return NodeFilter.FILTER_REJECT;
		}
		if (node.role == "treeitem") {
			return NodeFilter.FILTER_ACCEPT;
		}
		return NodeFilter.FILTER_SKIP;
	}
);

function selectItem(item) {
	if (!item) {
		return;
	}
	const orig = tree.ariaActiveDescendantElement;
	if (orig) {
		orig.classList.remove("selected");
	}
	tree.ariaActiveDescendantElement = item;
	item.classList.add("selected");
}

tree.addEventListener("keydown", evt => {
	walker.currentNode = getSelectedItem();
	switch (evt.key) {
		case "ArrowDown":
			selectItem(walker.nextNode());
			break;
		case "ArrowUp":
			selectItem(walker.previousNode());
			break;
		case "ArrowRight":
			if (walker.currentNode.ariaExpanded == "true") {
				selectItem(walker.nextNode());
			} else if (walker.currentNode.ariaExpanded == "false") {
				walker.currentNode.ariaExpanded = "true";
			}
			break;
		case "ArrowLeft":
			if (walker.currentNode.ariaExpanded == "true") {
				walker.currentNode.ariaExpanded = "false";
			} else {
				selectItem(walker.parentNode());
			}
			break;
		case "Home":
			walker.currentNode = tree;
			selectItem(walker.firstChild());
			break;
		case "End":
			while (walker.nextNode()) {}
			selectItem(walker.currentNode);
			break;
	}
});

threadSel.addEventListener("change", evt => updateTree());
invert.addEventListener("click", evt => {
	updateTree(true);
	tree.focus();
});

// Recursively hides branches in the tree if they don't contain the filter text.
// Returns true if the item contains the filter text.
function filterSubtree(root, filterText) {
	if (root.frame.toLowerCase().includes(filterText)) {
		// Include this item and all its descendants.
		return true;
	}
	const container = root.children[1];
	if (container) {
		for (const child of container.children) {
			if (filterSubtree(child, filterText)) {
				// A descendant matches. Include all its ancestors so it is reachable.
				return true;
			}
		}
	}
	root.classList.add("excluded");
	return false;
}

filter.addEventListener("change", evt => {
	const prevSel = getSelectedItem();
	// Unfilter the tree.
	for (const item of tree.querySelectorAll(".excluded")) {
		item.classList.remove("excluded");
	}
	const filterText = filter.value.toLowerCase();
	if (filterText) {
		for (const item of tree.children) {
			filterSubtree(item, filterText);
		}
	}
	if (!prevSel || prevSel.classList.contains("excluded") ||
		prevSel.closest(".excluded")
	) {
		// The previously selected item is now hidden or the tree was empty. Select
		// the first item.
		selectItem(document.querySelector("#tree > [role=treeitem]:not(.excluded)"));
	}
});
</script>

</body>
</html>
